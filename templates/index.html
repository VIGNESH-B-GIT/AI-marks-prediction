<!DOCTYPE html>
<html>
<head>
    <title>AI Marks Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">
    <h1>AI Marks Predictor 🎓</h1>

    <form action="/predict" method="post">
        <input type="number" name="hours" placeholder="Enter study hours" required>
        <button type="submit">Predict</button>
    </form>

    {% if result %}
        <div class="result">
            Predicted Marks: {{ result }}
        </div>
    {% endif %}

    {% if history %}
        <h3>History</h3>
        <ul>
            {% for h, r in history %}
                <li>{{ h }} hrs → {{ r }} marks</li>
            {% endfor %}
        </ul>
    {% endif %}
</div>

</body>
</html>
